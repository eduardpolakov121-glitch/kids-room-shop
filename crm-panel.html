<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Room CRM</title>
  <style>
    :root{
      --bg:#f4f6fb;
      --card:#ffffff;
      --text:#243041;
      --muted:#6d7888;
      --line:#e7ebf2;
      --orange:#ff8f3d;
      --orange-dark:#e97620;
      --danger:#e05650;
      --success:#18a464;
      --blue:#4f73ff;
      --shadow:0 10px 30px rgba(27,39,61,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .topbar{
      position:sticky;top:0;z-index:30;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    .topbar-inner{
      max-width:1440px;margin:0 auto;padding:14px 18px;
      display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .brand-logo{
      width:46px;height:46px;border-radius:15px;background:linear-gradient(135deg,#ffd8b7,#fff3df);
      display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:inset 0 0 0 1px rgba(255,107,0,.08)
    }
    .brand-title{font-size:24px;font-weight:800;color:var(--orange-dark);line-height:1}
    .brand-sub{font-size:13px;color:var(--muted);margin-top:4px}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:none;border-radius:14px;padding:12px 16px;cursor:pointer;font-weight:700;
      transition:.18s;display:inline-flex;align-items:center;justify-content:center;text-decoration:none
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:var(--orange);color:#fff}
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.success{background:var(--success);color:#fff}

    .shell{max-width:1440px;margin:18px auto;padding:0 18px 28px}
    .toolbar{
      display:grid;grid-template-columns:1.3fr .8fr .8fr .8fr;gap:12px;margin-bottom:16px;
    }
    .toolbar input,.toolbar select{
      width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;font-size:14px;
    }
    .stats{
      display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px;
    }
    .stat{
      background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--shadow)
    }
    .stat .k{font-size:13px;color:var(--muted);margin-bottom:8px}
    .stat .v{font-size:28px;font-weight:800}
    .board{
      display:grid;grid-template-columns:repeat(7,minmax(260px,1fr));gap:14px;align-items:start;overflow:auto;padding-bottom:8px;
    }
    .col{
      background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);min-height:260px;
    }
    .col-head{
      padding:16px 16px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center
    }
    .col-title{font-size:16px;font-weight:800}
    .col-count{
      min-width:34px;height:34px;border-radius:999px;background:#fff1e7;color:#d86b14;font-size:13px;font-weight:800;
      display:flex;align-items:center;justify-content:center
    }
    .col-body{padding:8px}
    .order-row{padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s;background:#fff}
    .order-row:last-child{border-bottom:none}
    .order-row:hover{background:#fff9f4}
    .order-id{font-weight:700}
    .order-main{display:flex;flex-direction:column;gap:5px;min-width:0}
    .order-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .order-sub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stage-pill{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:6px 12px;border-radius:999px;background:#fff1e7;color:#d86b14;font-size:12px;font-weight:700;justify-self:start}
    .sum{font-weight:700;font-size:16px}
    .empty{padding:28px;text-align:center;color:var(--muted)}
    .drawer-wrap{position:fixed;inset:0;background:rgba(10,18,34,.42);display:none;z-index:60}
    .drawer-wrap.open{display:block}
    .drawer{position:absolute;top:0;right:0;height:100%;width:min(920px,100%);background:#fff;box-shadow:-12px 0 40px rgba(0,0,0,.18);display:flex;flex-direction:column}
    .drawer-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .drawer-head h2{margin:0;font-size:22px}
    .drawer-body{padding:18px 20px 108px;overflow:auto}
    .drawer-footer{position:absolute;left:0;right:0;bottom:0;padding:16px 20px;border-top:1px solid var(--line);background:#fff;display:flex;gap:10px;flex-wrap:wrap}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .panel{background:#f8faff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
    .panel h3{margin:0 0 12px;font-size:17px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:14px}
    .field textarea{min-height:92px;resize:vertical}
    .field.inline-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .items{display:flex;flex-direction:column;gap:10px}
    .item{
      display:flex;justify-content:space-between;gap:12px;padding:12px;border-radius:14px;background:#fff;border:1px solid var(--line)
    }
    .item-name{font-weight:700}
    .item-main{min-width:0;flex:1}
    .item-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .item-badge{
      display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:800;line-height:1;
    }
    .item-badge-hit{background:#fff1e6;color:#ca6200}
    .item-badge-sale{background:#fff0f0;color:#c64c4c}
    .item-badge-new{background:#edf8ff;color:#23628d}
    .history-line{padding:10px 0;border-bottom:1px dashed var(--line);}
    .muted{color:var(--muted);font-size:13px}
    .login-screen{
      max-width:480px;margin:90px auto;background:#fff;border:1px solid var(--line);border-radius:24px;
      box-shadow:var(--shadow);padding:26px;
    }
    .login-screen h1{margin:0 0 8px}
    .login-screen p{margin:0 0 18px;color:var(--muted);line-height:1.7}
    .login-screen input{width:100%;padding:14px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;font-size:15px;margin-bottom:10px}
    .auth-error{margin-top:10px;color:var(--danger);font-size:14px}
    @media (max-width:1100px){
      .toolbar,.stats,.grid-2{grid-template-columns:1fr 1fr}
    }
    @media (max-width:760px){
      .toolbar,.stats,.grid-2{grid-template-columns:1fr}
      .shell{padding:0 12px 22px}
      .topbar-inner{padding:12px}
      .drawer{width:100%}
    }
  </style>
</head>
<body>
  <div id="authRoot"></div>

  <template id="appTemplate">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-logo">📋</div>
          <div>
            <div class="brand-title">Kids Room CRM</div>
            <div class="brand-sub">Замовлення, статуси та картка клієнта</div>
          </div>
        </div>
        <div class="top-actions">
          <a class="btn secondary" href="admin-safe.html">Адмінка</a>
          <a class="btn secondary" href="index.html">Магазин</a>
          <button class="btn danger" onclick="logoutCRM()">Вийти</button>
        </div>
      </div>
    </div>

    <main class="shell">
      <section class="toolbar">
        <input id="searchInput" placeholder="Пошук: ім'я, телефон, місто, коментар..." />
        <select id="stageFilter"></select>
        <select id="deliveryFilter">
          <option value="">Всі доставки</option>
          <option value="Нова пошта">Нова пошта</option>
          <option value="Укрпошта">Укрпошта</option>
        </select>
        <select id="sortFilter">
          <option value="newest">Спочатку нові</option>
          <option value="oldest">Спочатку старі</option>
          <option value="total_desc">Сума ↓</option>
          <option value="total_asc">Сума ↑</option>
        </select>
      </section>

      <section class="stats">
        <div class="stat"><div class="k">Всього замовлень</div><div class="v" id="statTotal">0</div></div>
        <div class="stat"><div class="k">Нові</div><div class="v" id="statNew">0</div></div>
        <div class="stat"><div class="k">Відправлено</div><div class="v" id="statShipped">0</div></div>
        <div class="stat"><div class="k">Сума активних</div><div class="v" id="statSum">0 ₴</div></div>
      </section>

      <section class="board" id="board"></section>
    </main>

    <div class="drawer-wrap" id="drawerWrap" onclick="closeDrawer(event)">
      <div class="drawer">
        <div class="drawer-head">
          <h2>Картка замовлення</h2>
          <button class="btn secondary" onclick="forceCloseDrawer()">Закрити</button>
        </div>
        <div class="drawer-body">
          <div class="grid-2">
            <div>
              <div class="panel">
                <h3>Клієнт</h3>
                <div class="field"><label>Ім'я</label><input id="dFirstName" autocomplete="off"></div>
                <div class="field"><label>Прізвище</label><input id="dLastName" autocomplete="off"></div>
                <div class="field"><label>ПІБ</label><input id="dName" autocomplete="off"></div>
                <div class="field"><label>Телефон</label><input id="dPhone" autocomplete="off"></div>
                <div class="field"><label>Місто</label><input id="dCity" autocomplete="off"></div>
                <div class="field"><label>Доставка</label><input id="dDelivery" autocomplete="off"></div>
                <div class="field"><label>Адреса / відділення</label><textarea id="dAddress"></textarea></div>
              </div>

              <div class="panel">
                <h3>Коментарі</h3>
                <div class="field"><label>Коментар оператора</label><textarea id="dOperatorComment"></textarea></div>
                <div class="field"><label>Коментар менеджера</label><textarea id="dManagerComment"></textarea></div>
              </div>
            </div>

            <div>
              <div class="panel">
                <h3>Етап і статус</h3>
                <div class="field"><label>Вкладка / етап</label><select id="dStage"></select></div>
                <div class="field"><label>Підпис статусу</label><input id="dStatus" autocomplete="off"></div>
                <div class="field inline-2">
                  <div>
                    <label>Дата створення</label>
                    <input id="dCreated" readonly>
                  </div>
                  <div>
                    <label>Оновлено</label>
                    <input id="dUpdated" readonly>
                  </div>
                </div>
                <div class="field"><label>Сума</label><input id="dTotal" type="number" min="0" step="0.01"></div>
              </div>

              <div class="panel">
                <h3>Товари</h3>
                <div id="dItems" class="items"></div>
              </div>

              <div class="panel">
                <h3>Історія</h3>
                <div id="dHistory"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="drawer-footer">
          <button id="saveOrderBtn" class="btn success" onclick="saveDrawerOrder()">Зберегти</button>
          <button id="deleteOrderBtn" class="btn danger" onclick="deleteCurrentOrder()">Видалити</button>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://xhhzxiithajxgngmbzzd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_cRp6r2C_3nszludByS9V9Q_sl1QlHg5";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: false
      }
    });

    const STAGES = {
      new: { title: 'Нові', status: 'Новий', day: 0 },
      day1: { title: 'День 1', status: 'День 1', day: 1 },
      day2: { title: 'День 2', status: 'День 2', day: 2 },
      day3: { title: 'День 3', status: 'День 3', day: 3 },
      shipped: { title: 'Відправлено', status: 'Відправлено', day: 0 },
      completed: { title: 'Завершено', status: 'Завершено', day: 0 },
      cancelled: { title: 'Скасовано', status: 'Скасовано', day: 0 }
    };
    const STAGE_ORDER = ['new','day1','day2','day3','shipped','completed','cancelled'];

    let currentUser = null;
    let currentProfile = null;
    let allOrders = [];
    let selectedOrder = null;
    let activeStage = 'new';

    function escapeHtml(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatMoney(value){
      return `${Number(value || 0).toLocaleString('uk-UA')} ₴`;
    }

    function formatDate(value){
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('uk-UA');
    }

    function authError(text){
      document.getElementById('authRoot').innerHTML = `
        <div class="login-screen">
          <h1>CRM недоступна</h1>
          <p>Потрібен вхід у систему або права доступу до CRM.</p>
          <div class="auth-error">${escapeHtml(text || 'Помилка доступу')}</div>
          <div style="margin-top:14px">
            <a class="btn secondary" href="admin-safe.html">Повернутись в адмінку</a>
          </div>
        </div>
      `;
    }

    async function logoutCRM(){
      await supabaseClient.auth.signOut();
      location.reload();
    }

    function renderAppShell(){
      document.getElementById('authRoot').innerHTML = document.getElementById('appTemplate').innerHTML;
      document.getElementById('searchInput').addEventListener('input', refreshBoard);
      document.getElementById('stageFilter').addEventListener('change', event => {
        activeStage = event.target.value || 'all';
        refreshBoard();
      });
      document.getElementById('deliveryFilter').addEventListener('change', refreshBoard);
      document.getElementById('sortFilter').addEventListener('change', refreshBoard);
      renderStageOptions();
    }

    function renderStageOptions(){
      const stageFilter = document.getElementById('stageFilter');
      const drawerStage = document.getElementById('dStage');

      stageFilter.innerHTML = `<option value="all">Всі етапи</option>` +
        STAGE_ORDER.map(key => `<option value="${key}">${STAGES[key].title}</option>`).join('');

      drawerStage.innerHTML = STAGE_ORDER.map(key => `<option value="${key}">${STAGES[key].title}</option>`).join('');
    }

    async function bootCRM(){
      const { data: authData, error: authErr } = await supabaseClient.auth.getUser();
      if (authErr) throw authErr;

      currentUser = authData?.user || null;
      if (!currentUser) {
        authError('Користувач не авторизований');
        return;
      }

      const { data: profile, error: profileError } = await supabaseClient
        .from('crm_users')
        .select('*')
        .eq('email', currentUser.email)
        .maybeSingle();

      if (profileError) throw profileError;
      if (!profile) {
        authError('Для цього акаунта не знайдено профіль CRM');
        return;
      }

      currentProfile = profile;
      renderAppShell();
      await refreshOrders();
    }

    async function refreshOrders(){
      const { data, error } = await supabaseClient
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        alert('Помилка завантаження замовлень: ' + error.message);
        return;
      }

      allOrders = Array.isArray(data) ? data : [];
      refreshBoard();
      refreshStats();
    }

    function filteredOrders(){
      const search = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
      const stage = document.getElementById('stageFilter')?.value || 'all';
      const delivery = document.getElementById('deliveryFilter')?.value || '';
      const sort = document.getElementById('sortFilter')?.value || 'newest';

      let list = [...allOrders];

      if (stage !== 'all') {
        list = list.filter(order => (order.status_group || 'new') === stage);
      }

      if (delivery) {
        list = list.filter(order => String(order.delivery || '') === delivery);
      }

      if (search) {
        list = list.filter(order => {
          const text = [
            order.name,
            order.phone,
            order.city,
            order.address,
            order.operator_comment,
            order.manager_comment,
            order.status
          ].join(' ').toLowerCase();

          return text.includes(search);
        });
      }

      if (sort === 'oldest') {
        list.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      } else if (sort === 'total_desc') {
        list.sort((a, b) => Number(b.total || 0) - Number(a.total || 0));
      } else if (sort === 'total_asc') {
        list.sort((a, b) => Number(a.total || 0) - Number(b.total || 0));
      } else {
        list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      }

      return list;
    }

    function refreshStats(){
      document.getElementById('statTotal').textContent = allOrders.length;
      document.getElementById('statNew').textContent = allOrders.filter(order => (order.status_group || 'new') === 'new').length;
      document.getElementById('statShipped').textContent = allOrders.filter(order => (order.status_group || '') === 'shipped').length;

      const activeSum = allOrders
        .filter(order => !['cancelled','completed'].includes(order.status_group || 'new'))
        .reduce((sum, order) => sum + Number(order.total || 0), 0);

      document.getElementById('statSum').textContent = formatMoney(activeSum);
    }

    function renderBoard(){
      const board = document.getElementById('board');
      if (!board) return;

      const list = filteredOrders();
      board.innerHTML = STAGE_ORDER.map(stageKey => {
        const orders = list.filter(order => (order.status_group || 'new') === stageKey);

        return `
          <div class="col">
            <div class="col-head">
              <div class="col-title">${escapeHtml(STAGES[stageKey].title)}</div>
              <div class="col-count">${orders.length}</div>
            </div>
            <div class="col-body">
              ${orders.length ? orders.map(order => `
                <div class="order-row" onclick="openOrder('${escapeHtml(order.id)}')">
                  <div class="order-main">
                    <div class="order-id">#${escapeHtml(String(order.id).slice(-6))}</div>
                    <div class="order-name">${escapeHtml(order.name || 'Без імені')}</div>
                    <div class="order-sub">${escapeHtml(order.phone || '-')}</div>
                    <div class="order-sub">${escapeHtml(order.city || '-')} • ${escapeHtml(order.delivery || '-')}</div>
                    <div class="stage-pill">${escapeHtml(order.status || STAGES[stageKey].status)}</div>
                    <div class="sum">${formatMoney(order.total || 0)}</div>
                  </div>
                </div>
              `).join('') : `<div class="empty">Немає замовлень</div>`}
            </div>
          </div>
        `;
      }).join('');
    }

    function openOrder(orderId){
      selectedOrder = allOrders.find(order => String(order.id) === String(orderId));
      if (!selectedOrder) return;

      document.getElementById('dFirstName').value = selectedOrder.customer_first_name || '';
      document.getElementById('dLastName').value = selectedOrder.customer_last_name || '';
      document.getElementById('dName').value = selectedOrder.name || '';
      document.getElementById('dPhone').value = selectedOrder.phone || '';
      document.getElementById('dCity').value = selectedOrder.city || '';
      document.getElementById('dDelivery').value = selectedOrder.delivery || '';
      document.getElementById('dAddress').value = selectedOrder.address || '';
      document.getElementById('dOperatorComment').value = selectedOrder.operator_comment || '';
      document.getElementById('dManagerComment').value = selectedOrder.manager_comment || '';
      document.getElementById('dStage').value = selectedOrder.status_group || 'new';
      document.getElementById('dStatus').value = selectedOrder.status || STAGES[selectedOrder.status_group || 'new'].status;
      document.getElementById('dCreated').value = formatDate(selectedOrder.created_at);
      document.getElementById('dUpdated').value = formatDate(selectedOrder.updated_at || selectedOrder.created_at);
      document.getElementById('dTotal').value = Number(selectedOrder.total || 0);

      const onlyOperator = currentProfile.role === 'operator';
      document.getElementById('dManagerComment').readOnly = onlyOperator;
      document.getElementById('dStage').disabled = onlyOperator;
      document.getElementById('dStatus').readOnly = onlyOperator;
      document.getElementById('dTotal').readOnly = onlyOperator;

      renderItems(selectedOrder.items || []);
      renderHistory(selectedOrder);

      document.getElementById('drawerWrap').classList.add('open');
    }

    function buildItemBadges(item){
      const parts = [];

      if (item?.is_hit) {
        parts.push('<span class="item-badge item-badge-hit">ХІТ</span>');
      }

      if (item?.is_sale) {
        parts.push('<span class="item-badge item-badge-sale">АКЦІЯ</span>');
      }

      if (item?.is_new) {
        parts.push('<span class="item-badge item-badge-new">НОВИНКА</span>');
      }

      if (!parts.length) return '';

      return `<div class="item-badges">${parts.join('')}</div>`;
    }

    function renderItems(items){
      const root = document.getElementById('dItems');
      if (!Array.isArray(items) || !items.length) {
        root.innerHTML = '<div class="empty" style="padding:12px 0">Немає товарів</div>';
        return;
      }

      root.innerHTML = items.map(item => `
        <div class="item">
          <div class="item-main">
            ${buildItemBadges(item)}
            <div class="item-name">${escapeHtml(item.name || 'Товар')}</div>
            <div class="muted">Кількість: ${Number(item.qty || 1)}</div>
            <div class="muted">Ціна: ${formatMoney(Number(item.price || 0))}</div>
          </div>
          <div class="item-name">${formatMoney((Number(item.price || 0) * Number(item.qty || 1)))}</div>
        </div>
      `).join('');
    }

    function renderHistory(order){
      const lines = [
        `Створено: ${formatDate(order.created_at)}`,
        `Оновлено: ${formatDate(order.updated_at || order.created_at)}`,
        `Поточний етап: ${STAGES[order.status_group || 'new']?.title || '-'}`,
        `Статус: ${order.status || '-'}`,
        `Джерело: ${order.source || 'website'}`
      ];
      document.getElementById('dHistory').innerHTML = lines.map(line => `<div class="history-line">${escapeHtml(line)}</div>`).join('');
    }

    async function saveDrawerOrder(){
      if (!selectedOrder) return;

      const stage = document.getElementById('dStage').value;
      const payload = {
        customer_first_name: document.getElementById('dFirstName').value.trim(),
        customer_last_name: document.getElementById('dLastName').value.trim(),
        name: document.getElementById('dName').value.trim(),
        phone: document.getElementById('dPhone').value.trim(),
        city: document.getElementById('dCity').value.trim(),
        delivery: document.getElementById('dDelivery').value.trim(),
        address: document.getElementById('dAddress').value.trim(),
        operator_comment: document.getElementById('dOperatorComment').value.trim(),
        updated_at: new Date().toISOString()
      };

      if (currentProfile.role === 'admin') {
        payload.status_group = stage;
        payload.status = document.getElementById('dStatus').value.trim() || STAGES[stage].status;
        payload.day_bucket = STAGES[stage].day;
        payload.manager_comment = document.getElementById('dManagerComment').value.trim();
        payload.total = Number(document.getElementById('dTotal').value || 0);
        if (selectedOrder.status_group !== stage) {
          payload.moved_at = new Date().toISOString();
        }
      }

      if (!payload.name) {
        payload.name = [payload.customer_first_name, payload.customer_last_name].filter(Boolean).join(' ').trim();
      }

      const { error } = await supabaseClient
        .from('orders')
        .update(payload)
        .eq('id', selectedOrder.id);

      if (error) {
        alert('Помилка збереження: ' + error.message);
        return;
      }

      await refreshOrders();
      forceCloseDrawer();
      alert('Замовлення збережено ✅');
    }

    async function deleteCurrentOrder(){
      if (currentProfile.role !== 'admin') return;
      if (!selectedOrder) return;
      if (!confirm('Видалити замовлення?')) return;

      const { error } = await supabaseClient
        .from('orders')
        .delete()
        .eq('id', selectedOrder.id);

      if (error) {
        alert('Не вдалося видалити: ' + error.message);
        return;
      }

      await refreshOrders();
      forceCloseDrawer();
      alert('Замовлення видалено ✅');
    }

    function closeDrawer(event){
      if (event.target.id === 'drawerWrap') forceCloseDrawer();
    }

    function forceCloseDrawer(){
      document.getElementById('drawerWrap').classList.remove('open');
      selectedOrder = null;
    }

    bootCRM().catch(error => {
      console.error(error);
      authError(error.message || 'Помилка запуску CRM');
    });
  </script>
</body>
</html>
