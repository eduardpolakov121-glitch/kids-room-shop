<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Room CRM Pro</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --line:#e7ebf3;
      --text:#1f2a44;
      --muted:#75809a;
      --accent:#ff8f3d;
      --accent-dark:#ef7d27;
      --soft:#eef3fb;
      --danger:#e05650;
      --success:#2db783;
      --shadow:0 12px 35px rgba(31,42,68,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}
    .app-header{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 22px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
    .brand{display:flex;align-items:center;gap:12px}
    .brand-badge{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#ff8f3d,#ffd66e);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700}
    .brand h1{margin:0;font-size:24px}
    .header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .btn{border:none;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:700;cursor:pointer}
    .btn.primary{background:var(--accent);color:#fff}
    .btn.primary:hover{background:var(--accent-dark)}
    .btn.secondary{background:#eef2fb;color:var(--text)}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.success{background:var(--success);color:#fff}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .role-badge{padding:8px 12px;border-radius:999px;background:#eef2fb;font-weight:700;font-size:13px}
    .muted{color:var(--muted)}
    .layout{padding:22px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
    .stat-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
    .stat-card .label{color:var(--muted);font-size:13px;margin-bottom:8px}
    .stat-card .value{font-size:28px;font-weight:700}
    .toolbar{display:grid;grid-template-columns:1.35fr .85fr .8fr auto;gap:12px;align-items:center;margin-bottom:16px}
    .toolbar input,.toolbar select{width:100%;padding:14px;border:1px solid var(--line);border-radius:14px;background:#fff;font-size:14px}
    .tabs{display:flex;gap:10px;overflow:auto;padding-bottom:8px;margin-bottom:16px}
    .tab-btn{border:none;background:#eaf0fb;color:var(--text);padding:12px 16px;border-radius:14px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px}
    .tab-btn.active{background:var(--accent);color:#fff}
    .tab-count{padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.8);color:#28324a;font-size:12px;font-weight:700}
    .tab-btn.active .tab-count{background:rgba(255,255,255,.22);color:#fff}
    .list-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
    .list-head,.order-row{display:grid;grid-template-columns:130px 1.2fr 1fr 1.2fr 140px 160px 130px;gap:12px;align-items:center}
    .list-head{padding:16px 18px;background:#f8faff;border-bottom:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .order-row{padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s;background:#fff}
    .order-row:last-child{border-bottom:none}
    .order-row:hover{background:#fff9f4}
    .order-id{font-weight:700}
    .order-main{display:flex;flex-direction:column;gap:5px;min-width:0}
    .order-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .order-sub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stage-pill{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:6px 12px;border-radius:999px;background:#fff1e7;color:#d86b14;font-size:12px;font-weight:700;justify-self:start}
    .sum{font-weight:700;font-size:16px}
    .empty{padding:28px;text-align:center;color:var(--muted)}
    .drawer-wrap{position:fixed;inset:0;background:rgba(10,18,34,.42);display:none;z-index:60}
    .drawer-wrap.open{display:block}
    .drawer{position:absolute;top:0;right:0;height:100%;width:min(920px,100%);background:#fff;box-shadow:-12px 0 40px rgba(0,0,0,.18);display:flex;flex-direction:column}
    .drawer-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .drawer-head h2{margin:0;font-size:22px}
    .drawer-body{padding:18px 20px 108px;overflow:auto}
    .drawer-footer{position:absolute;left:0;right:0;bottom:0;padding:16px 20px;border-top:1px solid var(--line);background:#fff;display:flex;gap:10px;flex-wrap:wrap}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .panel{background:#f8faff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
    .panel h3{margin:0 0 12px;font-size:17px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:14px}
    .field textarea{min-height:92px;resize:vertical}
    .field.inline-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .items{display:flex;flex-direction:column;gap:10px}
    .item{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--line);
      align-items:flex-start;
    }
    .item-left{display:flex;gap:12px;align-items:flex-start;flex:1;min-width:0}
    .item-image{
      width:58px;
      height:58px;
      border-radius:12px;
      object-fit:cover;
      background:#f1f3f7;
      flex-shrink:0;
    }
    .item-main{min-width:0;flex:1}
    .item-name{font-weight:700;line-height:1.35;margin-bottom:4px}
    .item-sub{font-size:13px;color:var(--muted)}
    .item-total{font-weight:700;white-space:nowrap}
    .item-flags{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-bottom:6px;
    }
    .item-flag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      line-height:1;
    }
    .item-flag.hit{background:#fff1e6;color:#ca6200}
    .item-flag.sale{background:#fff0f0;color:#c64c4c}
    .item-flag.new{background:#edf8ff;color:#23628d}
    .history-line{padding:10px 0;border-bottom:1px dashed var(--line);font-size:14px}
    .history-line:last-child{border-bottom:none}
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-card{width:100%;max-width:460px;background:#fff;border-radius:24px;padding:28px;box-shadow:var(--shadow);border:1px solid var(--line)}
    .auth-card h2{margin:0 0 8px;font-size:28px}
    .auth-card input{width:100%;padding:14px;border:1px solid var(--line);border-radius:14px;margin-bottom:12px;font-size:15px}
    .auth-card button{width:100%;padding:14px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
    .auth-note{margin-top:14px;font-size:13px;color:var(--muted)}
    @media (max-width:1280px){
      .stats{grid-template-columns:repeat(2,1fr)}
      .toolbar{grid-template-columns:1fr 1fr}
      .list-head,.order-row{grid-template-columns:110px 1.2fr 1fr 1fr 120px 140px 120px}
    }
    @media (max-width:980px){
      .layout{padding:16px}
      .stats,.toolbar,.grid-2,.field.inline-2{grid-template-columns:1fr}
      .list-head{display:none}
      .order-row{grid-template-columns:1fr;gap:8px}
      .order-row > div{justify-self:start}
      .drawer{width:100%}
      .app-header{padding:16px;align-items:flex-start}
      .header-actions{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div id="authView" class="auth-wrap">
    <div class="auth-card">
      <h2>Kids Room CRM Pro</h2>
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="off" autocapitalize="off" spellcheck="false">
      <input id="loginPassword" type="password" placeholder="Пароль" autocomplete="new-password">
      <button onclick="loginCRM()">Увійти</button>
      <div id="authError" class="auth-note"></div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <header class="app-header">
      <div class="brand">
        <div class="brand-badge">K</div>
        <div>
          <h1>Kids Room CRM Pro</h1>
        </div>
      </div>
      <div class="header-actions">
        <span id="userRoleBadge" class="role-badge">role</span>
        <span id="userEmail" class="muted"></span>
        <button class="btn secondary" onclick="refreshOrders()">Оновити</button>
        <button class="btn danger" onclick="logoutCRM()">Вийти</button>
      </div>
    </header>

    <div class="layout">
      <section class="stats">
        <div class="stat-card"><div class="label">Замовлень сьогодні</div><div class="value" id="statToday">0</div></div>
        <div class="stat-card"><div class="label">У роботі зараз</div><div class="value" id="statActive">0</div></div>
        <div class="stat-card"><div class="label">Виторг по вибірці</div><div class="value" id="statRevenue">0 грн</div></div>
        <div class="stat-card"><div class="label">Відправлено / завершено</div><div class="value" id="statShipped">0</div></div>
      </section>

      <section class="toolbar">
        <input id="searchInput" placeholder="Пошук: ім'я, телефон, місто" oninput="applyFilters()" autocomplete="off" spellcheck="false">
        <select id="deliveryFilter" onchange="applyFilters()">
          <option value="all">Вся доставка</option>
          <option value="Нова пошта">Нова пошта</option>
          <option value="Укрпошта">Укрпошта</option>
        </select>
        <select id="sortFilter" onchange="applyFilters()">
          <option value="new">Спочатку новіші</option>
          <option value="old">Спочатку старіші</option>
          <option value="expensive">Сума: більші</option>
          <option value="cheap">Сума: менші</option>
        </select>
        <button class="btn primary" onclick="refreshOrders()">Оновити дані</button>
      </section>

      <section id="tabsBar" class="tabs"></section>

      <section class="list-card">
        <div class="list-head">
          <div>ID</div>
          <div>Клієнт</div>
          <div>Телефон</div>
          <div>Доставка</div>
          <div>Етап</div>
          <div>Створено</div>
          <div>Сума</div>
        </div>
        <div id="ordersList"></div>
      </section>
    </div>
  </div>

  <div id="drawerWrap" class="drawer-wrap" onclick="closeDrawer(event)">
    <div class="drawer" onclick="event.stopPropagation()">
      <div class="drawer-head">
        <div>
          <h2 id="drawerTitle">Замовлення</h2>
          <div id="drawerSub" class="muted"></div>
        </div>
        <button class="btn secondary" onclick="forceCloseDrawer()">Закрити</button>
      </div>
      <div class="drawer-body">
        <div class="grid-2">
          <div>
            <div class="panel">
              <h3>Клієнт</h3>
              <div class="field inline-2">
                <div>
                  <label>Ім'я</label>
                  <input id="dFirstName" autocomplete="off">
                </div>
                <div>
                  <label>Прізвище</label>
                  <input id="dLastName" autocomplete="off">
                </div>
              </div>
              <div class="field"><label>Повне ім'я</label><input id="dName" autocomplete="off"></div>
              <div class="field"><label>Телефон</label><input id="dPhone" autocomplete="off"></div>
              <div class="field"><label>Місто</label><input id="dCity" autocomplete="off"></div>
              <div class="field"><label>Тип доставки</label>
                <select id="dDelivery">
                  <option value="Нова пошта">Нова пошта</option>
                  <option value="Укрпошта">Укрпошта</option>
                  <option value="Інше">Інше</option>
                </select>
              </div>
              <div class="field"><label>Адреса / відділення / індекс</label><textarea id="dAddress" autocomplete="off"></textarea></div>
            </div>

            <div class="panel">
              <h3>Коментарі</h3>
              <div class="field"><label>Коментар оператора</label><textarea id="dOperatorComment" placeholder="Результат дзвінка, уточнення, домовленості"></textarea></div>
              <div class="field"><label>Коментар адміністратора</label><textarea id="dManagerComment" placeholder="Службова нотатка, внутрішня позначка"></textarea></div>
            </div>
          </div>

          <div>
            <div class="panel">
              <h3>Етап і статус</h3>
              <div class="field"><label>Вкладка / етап</label><select id="dStage"></select></div>
              <div class="field"><label>Підпис статусу</label><input id="dStatus" autocomplete="off"></div>
              <div class="field inline-2">
                <div>
                  <label>Дата створення</label>
                  <input id="dCreated" readonly>
                </div>
                <div>
                  <label>Оновлено</label>
                  <input id="dUpdated" readonly>
                </div>
              </div>
              <div class="field"><label>Сума</label><input id="dTotal" type="number" min="0" step="0.01"></div>
            </div>

            <div class="panel">
              <h3>Товари</h3>
              <div id="dItems" class="items"></div>
            </div>

            <div class="panel">
              <h3>Історія</h3>
              <div id="dHistory"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="drawer-footer">
        <button id="saveOrderBtn" class="btn success" onclick="saveDrawerOrder()">Зберегти</button>
        <button id="deleteOrderBtn" class="btn danger" onclick="deleteCurrentOrder()">Видалити</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://xhhzxiithajxgngmbzzd.supabase.co";
    const SUPABASE_KEY = "sb_publishable_cRp6r2C_3nszludByS9V9Q_sl1QlHg5";
    const PRODUCT_PLACEHOLDER = "product-placeholder.svg";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: false
      }
    });

    const STAGES = {
      new: { title: 'Нові', status: 'Новий', day: 0 },
      day1: { title: 'День 1', status: 'День 1', day: 1 },
      day2: { title: 'День 2', status: 'День 2', day: 2 },
      day3: { title: 'День 3', status: 'День 3', day: 3 },
      shipped: { title: 'Відправлено', status: 'Відправлено', day: 0 },
      completed: { title: 'Завершено', status: 'Завершено', day: 0 },
      cancelled: { title: 'Скасовано', status: 'Скасовано', day: 0 }
    };
    const STAGE_ORDER = ['new','day1','day2','day3','shipped','completed','cancelled'];

    let currentUser = null;
    let currentProfile = null;
    let allOrders = [];
    let selectedOrder = null;
    let activeStage = 'new';

    function formatMoney(value){
      const num = Number(value || 0);
      return num.toLocaleString('uk-UA', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' грн';
    }

    function formatDate(value){
      if (!value) return '-';
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;
      return d.toLocaleString('uk-UA');
    }

    function getOrderName(order){
      return order.name || [order.customer_first_name, order.customer_last_name].filter(Boolean).join(' ') || 'Без імені';
    }

    function shortId(id){
      if (!id) return '-';
      return String(id).slice(0,8);
    }

    function normalizeStage(order){
      if (order.status_group && STAGES[order.status_group]) return order.status_group;
      const status = String(order.status || '').toLowerCase();
      if (status.includes('день 1')) return 'day1';
      if (status.includes('день 2')) return 'day2';
      if (status.includes('день 3')) return 'day3';
      if (status.includes('відправ')) return 'shipped';
      if (status.includes('заверш')) return 'completed';
      if (status.includes('скас') || status.includes('відм')) return 'cancelled';
      return 'new';
    }

    function authError(text){
      document.getElementById('authError').textContent = text || '';
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getSafeItemImage(item){
      const value = String(item?.img || '').trim();
      return value || PRODUCT_PLACEHOLDER;
    }

    function renderItemFlags(item){
      const parts = [];
      if (item?.is_hit) parts.push('<span class="item-flag hit">ХІТ</span>');
      if (item?.is_sale) parts.push('<span class="item-flag sale">АКЦІЯ</span>');
      if (item?.is_new) parts.push('<span class="item-flag new">НОВИНКА</span>');
      if (!parts.length) return '';
      return `<div class="item-flags">${parts.join('')}</div>`;
    }

    async function loginCRM(){
      authError('');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const btn = document.querySelector('.auth-card button');
      btn.disabled = true;
      btn.textContent = 'Вхід...';

      try {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          authError(error.message || 'Помилка входу');
          return;
        }
        window.location.reload();
      } catch (error) {
        authError(error.message || 'Помилка входу');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Увійти';
      }
    }

    async function logoutCRM(){
      await supabaseClient.auth.signOut();
      location.reload();
    }

    async function loadProfile(userId){
      const { data, error } = await supabaseClient
        .from('crm_profiles')
        .select('*')
        .eq('id', userId)
        .single();
      if (error) throw error;
      return data;
    }

    async function bootCRM(){
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session?.user) {
        document.getElementById('authView').classList.remove('hidden');
        document.getElementById('appView').classList.add('hidden');
        return;
      }

      currentUser = session.user;
      currentProfile = await loadProfile(currentUser.id);

      document.getElementById('userRoleBadge').textContent = currentProfile.role === 'admin' ? 'Адмін' : 'Оператор';
      document.getElementById('userEmail').textContent = currentUser.email || '';
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('deleteOrderBtn').style.display = currentProfile.role === 'admin' ? 'inline-flex' : 'none';

      renderStageSelect();
      await refreshOrders();
    }

    function renderStageSelect(){
      const select = document.getElementById('dStage');
      select.innerHTML = STAGE_ORDER.map(key => `<option value="${key}">${STAGES[key].title}</option>`).join('');
    }

    async function refreshOrders(){
      const { data, error } = await supabaseClient
        .from('orders')
        .select('*')
        .order('created_at', { ascending:false });

      if (error) {
        alert('Не вдалося завантажити замовлення: ' + error.message);
        return;
      }

      allOrders = (data || []).map(order => ({
        ...order,
        status_group: normalizeStage(order),
        items: Array.isArray(order.items) ? order.items : []
      }));

      applyFilters();
    }

    function getFilteredOrders(){
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const delivery = document.getElementById('deliveryFilter').value;
      const sort = document.getElementById('sortFilter').value;

      let list = [...allOrders];

      if (activeStage !== 'all') {
        list = list.filter(order => order.status_group === activeStage);
      }

      if (delivery !== 'all') {
        list = list.filter(order => String(order.delivery || '').trim() === delivery);
      }

      if (search) {
        list = list.filter(order => {
          const haystack = [
            order.name,
            order.customer_first_name,
            order.customer_last_name,
            order.phone,
            order.city
          ].join(' ').toLowerCase();

          return haystack.includes(search);
        });
      }

      if (sort === 'old') {
        list.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      } else if (sort === 'expensive') {
        list.sort((a,b) => Number(b.total || 0) - Number(a.total || 0));
      } else if (sort === 'cheap') {
        list.sort((a,b) => Number(a.total || 0) - Number(b.total || 0));
      } else {
        list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      }

      return list;
    }

    function renderStats(){
      const list = getFilteredOrders();
      const today = new Date();
      const sameDay = order => {
        const d = new Date(order.created_at);
        return d.getFullYear() === today.getFullYear()
          && d.getMonth() === today.getMonth()
          && d.getDate() === today.getDate();
      };

      document.getElementById('statToday').textContent = list.filter(sameDay).length;
      document.getElementById('statActive').textContent = list.filter(order => ['new','day1','day2','day3'].includes(order.status_group)).length;
      document.getElementById('statRevenue').textContent = formatMoney(list.reduce((sum, order) => sum + Number(order.total || 0), 0));
      document.getElementById('statShipped').textContent = list.filter(order => ['shipped','completed'].includes(order.status_group)).length;
    }

    function renderTabs(){
      const counts = STAGE_ORDER.reduce((acc, key) => {
        acc[key] = allOrders.filter(order => order.status_group === key).length;
        return acc;
      }, {});

      const bar = document.getElementById('tabsBar');
      bar.innerHTML = STAGE_ORDER.map(key => `
        <button class="tab-btn ${activeStage === key ? 'active' : ''}" onclick="setActiveStage('${key}')">
          ${STAGES[key].title}
          <span class="tab-count">${counts[key] || 0}</span>
        </button>
      `).join('');
    }

    function renderOrdersList(){
      const root = document.getElementById('ordersList');
      const list = getFilteredOrders();

      if (!list.length) {
        root.innerHTML = '<div class="empty">Замовлень не знайдено</div>';
        return;
      }

      root.innerHTML = list.map(order => `
        <div class="order-row" onclick="openOrder('${escapeHtml(order.id)}')">
          <div class="order-id">#${escapeHtml(shortId(order.id))}</div>
          <div class="order-main">
            <div class="order-name">${escapeHtml(getOrderName(order))}</div>
            <div class="order-sub">${escapeHtml(order.city || '-')}</div>
          </div>
          <div>${escapeHtml(order.phone || '-')}</div>
          <div>${escapeHtml(order.delivery || '-')}</div>
          <div class="stage-pill">${escapeHtml(STAGES[order.status_group]?.title || '-')}</div>
          <div>${escapeHtml(formatDate(order.created_at))}</div>
          <div class="sum">${escapeHtml(formatMoney(order.total || 0))}</div>
        </div>
      `).join('');
    }

    function applyFilters(){
      renderStats();
      renderTabs();
      renderOrdersList();
    }

    function setActiveStage(stage){
      activeStage = stage;
      renderTabs();
      renderOrdersList();
    }

    function openOrder(orderId){
      selectedOrder = allOrders.find(item => item.id === orderId);
      if (!selectedOrder) return;

      document.getElementById('drawerTitle').textContent = getOrderName(selectedOrder);
      document.getElementById('drawerSub').textContent = `Замовлення #${shortId(selectedOrder.id)} • ${formatDate(selectedOrder.created_at)}`;
      document.getElementById('dFirstName').value = selectedOrder.customer_first_name || '';
      document.getElementById('dLastName').value = selectedOrder.customer_last_name || '';
      document.getElementById('dName').value = selectedOrder.name || '';
      document.getElementById('dPhone').value = selectedOrder.phone || '';
      document.getElementById('dCity').value = selectedOrder.city || '';
      document.getElementById('dDelivery').value = selectedOrder.delivery || 'Нова пошта';
      document.getElementById('dAddress').value = selectedOrder.address || '';
      document.getElementById('dOperatorComment').value = selectedOrder.operator_comment || '';
      document.getElementById('dManagerComment').value = selectedOrder.manager_comment || '';
      document.getElementById('dStage').value = selectedOrder.status_group || 'new';
      document.getElementById('dStatus').value = selectedOrder.status || STAGES[selectedOrder.status_group || 'new'].status;
      document.getElementById('dCreated').value = formatDate(selectedOrder.created_at);
      document.getElementById('dUpdated').value = formatDate(selectedOrder.updated_at || selectedOrder.created_at);
      document.getElementById('dTotal').value = Number(selectedOrder.total || 0);

      const onlyOperator = currentProfile.role === 'operator';
      document.getElementById('dManagerComment').readOnly = onlyOperator;
      document.getElementById('dStage').disabled = onlyOperator;
      document.getElementById('dStatus').readOnly = onlyOperator;
      document.getElementById('dTotal').readOnly = onlyOperator;

      renderItems(selectedOrder.items || []);
      renderHistory(selectedOrder);

      document.getElementById('drawerWrap').classList.add('open');
    }

    function renderItems(items){
      const root = document.getElementById('dItems');
      if (!Array.isArray(items) || !items.length) {
        root.innerHTML = '<div class="empty" style="padding:12px 0">Немає товарів</div>';
        return;
      }

      root.innerHTML = items.map(item => `
        <div class="item">
          <div class="item-left">
            <img class="item-image" src="${escapeHtml(getSafeItemImage(item))}" alt="${escapeHtml(item.name || 'Товар')}" onerror="this.onerror=null;this.src='product-placeholder.svg'">
            <div class="item-main">
              ${renderItemFlags(item)}
              <div class="item-name">${escapeHtml(item.name || 'Товар')}</div>
              <div class="item-sub">Кількість: ${Number(item.qty || 1)} • Ціна: ${formatMoney(item.price || 0)}</div>
            </div>
          </div>
          <div class="item-total">${formatMoney((Number(item.price || 0) * Number(item.qty || 1)))}</div>
        </div>
      `).join('');
    }

    function renderHistory(order){
      const lines = [
        `Створено: ${formatDate(order.created_at)}`,
        `Оновлено: ${formatDate(order.updated_at || order.created_at)}`,
        `Поточний етап: ${STAGES[order.status_group || 'new']?.title || '-'}`,
        `Статус: ${order.status || '-'}`,
        `Джерело: ${order.source || 'website'}`
      ];
      document.getElementById('dHistory').innerHTML = lines.map(line => `<div class="history-line">${escapeHtml(line)}</div>`).join('');
    }

    async function saveDrawerOrder(){
      if (!selectedOrder) return;

      const stage = document.getElementById('dStage').value;
      const payload = {
        customer_first_name: document.getElementById('dFirstName').value.trim(),
        customer_last_name: document.getElementById('dLastName').value.trim(),
        name: document.getElementById('dName').value.trim(),
        phone: document.getElementById('dPhone').value.trim(),
        city: document.getElementById('dCity').value.trim(),
        delivery: document.getElementById('dDelivery').value.trim(),
        address: document.getElementById('dAddress').value.trim(),
        operator_comment: document.getElementById('dOperatorComment').value.trim(),
        updated_at: new Date().toISOString()
      };

      if (currentProfile.role === 'admin') {
        payload.status_group = stage;
        payload.status = document.getElementById('dStatus').value.trim() || STAGES[stage].status;
        payload.day_bucket = STAGES[stage].day;
        payload.manager_comment = document.getElementById('dManagerComment').value.trim();
        payload.total = Number(document.getElementById('dTotal').value || 0);
        if (selectedOrder.status_group !== stage) {
          payload.moved_at = new Date().toISOString();
        }
      }

      if (!payload.name) {
        payload.name = [payload.customer_first_name, payload.customer_last_name].filter(Boolean).join(' ').trim();
      }

      const { error } = await supabaseClient
        .from('orders')
        .update(payload)
        .eq('id', selectedOrder.id);

      if (error) {
        alert('Помилка збереження: ' + error.message);
        return;
      }

      await refreshOrders();
      forceCloseDrawer();
      alert('Замовлення збережено ✅');
    }

    async function deleteCurrentOrder(){
      if (currentProfile.role !== 'admin') return;
      if (!selectedOrder) return;
      if (!confirm('Видалити замовлення?')) return;

      const { error } = await supabaseClient
        .from('orders')
        .delete()
        .eq('id', selectedOrder.id);

      if (error) {
        alert('Не вдалося видалити: ' + error.message);
        return;
      }

      await refreshOrders();
      forceCloseDrawer();
      alert('Замовлення видалено ✅');
    }

    function closeDrawer(event){
      if (event.target.id === 'drawerWrap') forceCloseDrawer();
    }

    function forceCloseDrawer(){
      document.getElementById('drawerWrap').classList.remove('open');
      selectedOrder = null;
    }

    bootCRM().catch(error => {
      console.error(error);
      authError(error.message || 'Помилка запуску CRM');
    });
  </script>
</body>
</html>
