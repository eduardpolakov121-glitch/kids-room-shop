<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Room</title>
<link rel="stylesheet" href="style_updated.css">
</head>
<body>

<div id="cart-overlay" class="cart-overlay" onclick="closeCart()"></div>

<header>
    <div class="logo-wrap">
        <img src="logo.jpg" alt="Kids Room" class="logo-img">
        <div class="logo">Kids Room</div>
    </div>

    <div class="search-wrap">
        <input id="search" placeholder="🔍 Пошук товару">
    </div>

    <div class="cart-button" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<div class="banner">
    <img src="banner.jpg" alt="Kids Room banner">
</div>

<div class="container">
    <aside class="sidebar">
        <h3>Каталог</h3>
        <ul>
            <li onclick="filterCategory('all')">Всі товари</li>
            <li onclick="filterCategory('toy')">🧸 Іграшки</li>
            <li onclick="filterCategory('stroller')">🎀 Коляски</li>
            <li onclick="filterCategory('seat')">💺 Автокрісла</li>
            <li onclick="filterCategory('clothes')">👕 Одяг</li>
            <li onclick="filterCategory('transport')">🚲 Транспорт</li>
            <li onclick="filterCategory('sorter')">🧩 Сортери</li>
            <li onclick="filterCategory('baby')">🍼 Для немовлят</li>
            <li onclick="filterCategory('school')">🎒 Шкільні товари</li>
        </ul>
    </aside>

    <main>
        <div class="filters">
            <select onchange="sortProducts(this.value)">
                <option value="">Сортувати</option>
                <option value="cheap">Дешеві → дорогі</option>
                <option value="expensive">Дорогі → дешеві</option>
                <option value="name">По назві</option>
            </select>
        </div>

        <div id="products" class="products"></div>
    </main>
</div>

<div id="cart" class="cart">
    <h2>Кошик</h2>

    <div id="cart-items"></div>

    <h3 id="total"></h3>

    <div class="cart-buttons">
        <button onclick="clearCart()">Очистити</button>
        <button onclick="openCheckoutModal()">Оформити</button>
    </div>

    <button class="continue-btn" onclick="closeCart()">👉 Продовжити пошук</button>
</div>

<div id="checkout-modal" class="modal hidden">
    <div class="modal-card">
        <button class="modal-close" onclick="closeCheckoutModal()">✕</button>
        <h2>Оформлення замовлення</h2>

        <div class="checkout-form">
            <input id="checkout-name" type="text" placeholder="Ім'я">
            <input id="checkout-surname" type="text" placeholder="Прізвище">
            <input id="checkout-phone" type="tel" placeholder="Номер телефону">
            <input id="checkout-city" type="text" placeholder="Місто">

            <select id="checkout-delivery">
                <option value="">Оберіть доставку</option>
                <option value="Нова пошта">Нова пошта</option>
                <option value="Укрпошта">Укрпошта</option>
            </select>

            <input id="checkout-branch" type="text" placeholder="Відділення / адреса доставки">
        </div>

        <div class="checkout-total" id="checkout-total">Разом: 0 грн</div>

        <div class="modal-actions">
            <button onclick="submitCheckout()">Підтвердити замовлення</button>
            <button class="secondary-btn" onclick="closeCheckoutModal()">Скасувати</button>
        </div>
    </div>
</div>

<div class="social">
    <a href="viber://chat?number=%2B380684221803">Viber</a>
    <a href="tg://resolve?phone=380684221803">Telegram</a>
    <a href="https://www.instagram.com/kids.room.ua/">Instagram</a>
</div>

<script src="products.js"></script>
<script src="crm.js"></script>
<script src="cart_updated.js"></script>
<script src="script_updated.js"></script>

</body>
</html>
