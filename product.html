<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Room — Сторінка товару</title>
  <meta name="description" content="Сторінка товару Kids Room — ціна, фото, опис, схожі товари, швидке додавання в кошик та оформлення замовлення.">
  <link rel="stylesheet" href="style.css">
  <style>
    :root{
      --kr-orange:#ff6b00;
      --kr-card:#fffdf9;
      --kr-text:#243041;
      --kr-muted:#6f7b8c;
      --kr-line:#ece7df;
      --kr-shadow:0 14px 38px rgba(0,0,0,0.08);
    }

    body.product-body{
      background:linear-gradient(135deg,#f6f1ea 0%,#eef4f8 100%);
      min-height:100vh;
    }

    .product-topbar{
      position:sticky;
      top:0;
      z-index:1100;
      backdrop-filter:blur(12px);
      background:rgba(255,253,249,0.92);
      border-bottom:1px solid rgba(236,231,223,0.95);
      box-shadow:0 8px 24px rgba(0,0,0,0.05);
    }

    .product-topbar-inner{
      max-width:1320px;
      margin:0 auto;
      padding:14px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .product-brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .product-brand-logo{
      width:48px;
      height:48px;
      border-radius:16px;
      background:linear-gradient(135deg,#ffd8b7,#fff4d9);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      flex-shrink:0;
    }

    .product-brand-text .logo{
      display:block;
      font-size:20px;
      line-height:1.1;
      color:var(--kr-orange);
      font-weight:800;
    }

    .product-brand-text small{
      display:block;
      color:var(--kr-muted);
      margin-top:3px;
      font-size:13px;
    }

    .product-topbar-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .product-mini-btn,
    .product-primary-btn,
    .product-secondary-btn{
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-weight:700;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .product-mini-btn:hover,
    .product-primary-btn:hover,
    .product-secondary-btn:hover{
      transform:translateY(-1px);
    }

    .product-mini-btn{
      padding:11px 16px;
      background:#fff;
      color:var(--kr-text);
      border:1px solid var(--kr-line);
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
    }

    .product-cart-fab{
      position:relative;
      min-width:52px;
      height:52px;
      padding:0 16px;
      border:none;
      border-radius:16px;
      background:var(--kr-orange);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 12px 28px rgba(255,107,0,0.28);
      cursor:pointer;
    }

    .product-cart-fab.bump{
      animation:cartBump .45s ease;
    }

    #product-cart-count{
      position:absolute;
      right:-6px;
      top:-6px;
      min-width:22px;
      height:22px;
      border-radius:999px;
      background:#fff;
      color:var(--kr-orange);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:800;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
      padding:0 6px;
      box-sizing:border-box;
    }

    .product-shell{
      max-width:1320px;
      margin:0 auto;
      padding:28px 20px 48px;
      box-sizing:border-box;
    }

    .product-breadcrumbs{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      font-size:14px;
      color:var(--kr-muted);
      margin-bottom:20px;
    }

    .product-breadcrumbs a,
    .product-breadcrumbs button{
      background:none;
      border:none;
      padding:0;
      color:inherit;
      cursor:pointer;
      font:inherit;
    }

    .product-breadcrumbs a:hover,
    .product-breadcrumbs button:hover{
      color:var(--kr-orange);
    }

    .product-page-grid{
      display:grid;
      grid-template-columns:minmax(0,1fr) 360px;
      gap:24px;
      align-items:start;
    }

    .product-layout{
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:24px;
      align-items:start;
    }

    .product-gallery,
    .product-info-card,
    .product-related-side{
      background:var(--kr-card);
      border:1px solid rgba(236,231,223,0.95);
      border-radius:30px;
      box-shadow:var(--kr-shadow);
      overflow:hidden;
    }

    .product-gallery{
      padding:24px;
    }

    .product-gallery-frame{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      background:linear-gradient(145deg,#fbefe1,#f0e0cf);
      min-height:520px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .product-main-image{
      width:100%;
      max-height:640px;
      object-fit:contain;
      display:block;
      position:relative;
      z-index:1;
    }

    .product-image-chip{
      position:absolute;
      left:20px;
      bottom:20px;
      z-index:2;
      background:rgba(255,255,255,0.92);
      color:var(--kr-text);
      border:1px solid rgba(236,231,223,0.95);
      border-radius:999px;
      padding:10px 16px;
      font-size:14px;
      font-weight:700;
      box-shadow:0 8px 22px rgba(0,0,0,0.08);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .product-image-flags{
      position:absolute;
      top:20px;
      left:20px;
      z-index:3;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      max-width:72%;
    }

    .product-flag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      line-height:1;
      background:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,0.08);
    }

    .product-flag.hit{ background:#fff1e6; color:#ca6200; }
    .product-flag.sale{ background:#fff0f0; color:#c64c4c; }
    .product-flag.new{ background:#edf8ff; color:#23628d; }
    .product-flag.stock-in{ background:#ecfdf3; color:#15803d; }
    .product-flag.stock-low{ background:#fff7ed; color:#c2410c; }
    .product-flag.stock-out{ background:#f3f4f6; color:#6b7280; }

    .product-thumb-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .product-thumb{
      width:82px;
      height:82px;
      object-fit:cover;
      border-radius:14px;
      border:2px solid transparent;
      cursor:pointer;
      background:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,0.05);
    }

    .product-thumb.active{
      border-color:var(--kr-orange);
    }

    .product-info-card{
      padding:28px;
      box-sizing:border-box;
    }

    .product-badges{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }

    .product-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:700;
      background:#fff5ec;
      color:#b25a10;
      border:1px solid #ffe0c5;
    }

    .product-title{
      margin:0 0 16px;
      color:var(--kr-text);
      font-size:clamp(32px,4vw,48px);
      line-height:1.08;
      letter-spacing:-0.03em;
    }

    .product-price-row{
      display:flex;
      align-items:flex-end;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .product-price-current{
      font-size:clamp(34px,3.2vw,46px);
      line-height:1;
      font-weight:800;
      color:var(--kr-orange);
    }

    .product-price-old{
      font-size:20px;
      color:#97a0ab;
      text-decoration:line-through;
      margin-bottom:5px;
    }

    .product-discount{
      padding:7px 11px;
      border-radius:999px;
      background:#ffe8d7;
      color:#c35500;
      font-weight:800;
      font-size:14px;
      margin-bottom:6px;
    }

    .product-desc{
      color:#4d596b;
      font-size:17px;
      line-height:1.75;
      margin:0 0 18px;
    }

    .product-tags{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:0 0 18px;
    }

    .product-tag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      background:#f1f5f9;
      color:#334155;
    }

    .product-feature-list{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin:0 0 18px;
      padding:0;
      list-style:none;
    }

    .product-feature-list li{
      background:#fffaf4;
      border:1px solid #f2e6d8;
      border-radius:18px;
      padding:14px 16px;
      color:#445062;
      font-size:15px;
      line-height:1.45;
    }

    .product-feature-list strong{
      display:block;
      color:var(--kr-text);
      margin-bottom:4px;
      font-size:14px;
    }

    .product-trust-row{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin:0 0 20px;
    }

    .product-trust-card{
      background:#fff;
      border:1px solid #ece7df;
      border-radius:18px;
      padding:14px;
      box-shadow:0 8px 18px rgba(0,0,0,0.04);
    }

    .product-trust-card strong{
      display:block;
      color:#243041;
      margin-bottom:6px;
      font-size:14px;
    }

    .product-trust-card span{
      display:block;
      color:#6f7b8c;
      line-height:1.55;
      font-size:13px;
    }

    .product-buy-box{
      margin-top:10px;
      padding:18px;
      background:linear-gradient(180deg,#fff9f2 0%,#fff 100%);
      border:1px solid #f3e3d3;
      border-radius:24px;
    }

    .product-buy-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .product-stock{
      padding:9px 14px;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
      border:1px solid transparent;
    }

    .product-stock.stock-in{
      color:#15803d;
      background:#ecfdf3;
      border-color:#b7efca;
    }

    .product-stock.stock-low{
      color:#c2410c;
      background:#fff7ed;
      border-color:#fed7aa;
    }

    .product-stock.stock-out{
      color:#6b7280;
      background:#f3f4f6;
      border-color:#e5e7eb;
    }

    .product-qty{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .product-qty-label{
      font-weight:700;
      color:var(--kr-text);
    }

    .product-qty-control{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid #eadfce;
      border-radius:18px;
      padding:8px;
      box-shadow:0 8px 20px rgba(0,0,0,0.04);
    }

    .product-qty-control button{
      width:42px;
      height:42px;
      border:none;
      border-radius:14px;
      background:#f3f3f3;
      color:#253041;
      font-size:24px;
      cursor:pointer;
      font-weight:700;
    }

    .product-qty-control input{
      width:62px;
      height:42px;
      border:none;
      background:transparent;
      text-align:center;
      font-size:18px;
      font-weight:800;
      color:var(--kr-text);
      outline:none;
    }

    .product-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .product-primary-btn{
      min-height:56px;
      padding:14px 24px;
      background:linear-gradient(135deg,var(--kr-orange) 0%,#ff8a33 100%);
      color:#fff;
      box-shadow:0 16px 28px rgba(255,107,0,0.22);
      font-size:16px;
    }

    .product-primary-btn[disabled]{
      cursor:not-allowed;
      opacity:.7;
      box-shadow:none;
    }

    .product-secondary-btn{
      min-height:56px;
      padding:14px 22px;
      background:#fff;
      color:var(--kr-text);
      border:1px solid var(--kr-line);
      box-shadow:0 10px 22px rgba(0,0,0,0.04);
      font-size:16px;
    }

    .product-note{
      margin-top:16px;
      font-size:14px;
      color:var(--kr-muted);
      line-height:1.6;
    }

    .product-reviews{
      margin-top:22px;
      padding-top:20px;
      border-top:1px solid #ece7df;
    }

    .product-reviews h3{
      margin:0 0 14px;
      color:var(--kr-text);
      font-size:22px;
    }

    .product-review-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .product-review-card{
      background:#fff;
      border:1px solid #ece7df;
      border-radius:18px;
      padding:14px;
      box-shadow:0 8px 18px rgba(0,0,0,0.04);
    }

    .product-review-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .product-review-author{
      font-weight:800;
      color:#243041;
    }

    .product-review-date{
      color:#6f7b8c;
      font-size:13px;
    }

    .product-review-stars{
      color:#ff6600;
      font-size:14px;
      letter-spacing:1px;
      font-weight:900;
      margin-bottom:6px;
    }

    .product-review-text{
      color:#4d596b;
      line-height:1.6;
      font-size:14px;
    }

    .product-related-side{
      padding:18px;
      position:sticky;
      top:88px;
    }

    .product-related-head{
      margin-bottom:14px;
    }

    .product-related-head h2{
      margin:0 0 6px;
      font-size:24px;
      line-height:1.08;
      color:var(--kr-text);
    }

    .product-related-head p{
      margin:0;
      color:var(--kr-muted);
      line-height:1.55;
      font-size:14px;
    }

    .product-related-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .product-related-card{
      background:#fffdf9;
      border:1px solid #ece7df;
      border-radius:18px;
      box-shadow:0 8px 22px rgba(0,0,0,0.05);
      overflow:hidden;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .product-related-card:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(0,0,0,0.08);
    }

    .product-related-image{
      position:relative;
      background:#f6ece0;
      height:180px;
      overflow:hidden;
    }

    .product-related-image img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .product-related-flags{
      position:absolute;
      top:10px;
      left:10px;
      z-index:2;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      max-width:85%;
    }

    .product-related-flag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      line-height:1;
      background:#fff;
      box-shadow:0 6px 14px rgba(0,0,0,0.08);
    }

    .product-related-flag.hit{ background:#fff1e6; color:#ca6200; }
    .product-related-flag.sale{ background:#fff0f0; color:#c64c4c; }
    .product-related-flag.new{ background:#edf8ff; color:#23628d; }

    .product-related-body{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .product-related-name{
      margin:0;
      font-size:17px;
      line-height:1.35;
      color:var(--kr-text);
    }

    .product-related-desc{
      margin:0;
      color:var(--kr-muted);
      line-height:1.55;
      font-size:13px;
    }

    .product-related-price{
      display:flex;
      align-items:flex-end;
      gap:8px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .product-related-price .current{
      color:var(--kr-orange);
      font-size:20px;
      font-weight:800;
    }

    .product-related-price .old{
      color:#97a0ab;
      text-decoration:line-through;
      font-size:13px;
    }

    .product-related-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .product-related-actions button{
      flex:1;
      min-width:110px;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      font-weight:800;
      font-size:13px;
    }

    .product-related-actions .primary{
      background:var(--kr-orange);
      color:#fff;
    }

    .product-related-actions .secondary{
      background:#f1f3f6;
      color:var(--kr-text);
    }

    .product-empty{
      background:var(--kr-card);
      border-radius:28px;
      border:1px solid var(--kr-line);
      box-shadow:var(--kr-shadow);
      padding:40px 28px;
      text-align:center;
      max-width:720px;
      margin:48px auto 0;
    }

    .fly-clone{
      position:fixed;
      z-index:9999;
      pointer-events:none;
      border-radius:18px;
      object-fit:cover;
      box-shadow:0 18px 40px rgba(0,0,0,0.18);
      transition:
        transform .75s cubic-bezier(.2,.8,.2,1),
        opacity .75s ease,
        left .75s cubic-bezier(.2,.8,.2,1),
        top .75s cubic-bezier(.2,.8,.2,1),
        width .75s cubic-bezier(.2,.8,.2,1),
        height .75s cubic-bezier(.2,.8,.2,1);
    }

    @keyframes cartBump{
      0%{ transform:scale(1); }
      35%{ transform:scale(1.13); }
      100%{ transform:scale(1); }
    }

    @media (max-width:1100px){
      .product-page-grid{
        grid-template-columns:1fr;
      }
      .product-related-side{
        position:static;
      }
      .product-gallery-frame{
        min-height:420px;
      }
    }

    @media (max-width:768px){
      .product-shell{
        padding:18px 12px 30px;
      }
      .product-gallery,
      .product-info-card,
      .product-related-side{
        border-radius:24px;
      }
      .product-gallery{
        padding:14px;
      }
      .product-gallery-frame{
        min-height:300px;
        border-radius:20px;
      }
      .product-info-card,
      .product-related-side{
        padding:18px;
      }
      .product-feature-list,
      .product-trust-row{
        grid-template-columns:1fr;
      }
      .product-buy-top{
        flex-direction:column;
        align-items:flex-start;
      }
      .product-actions{
        flex-direction:column;
      }
      .product-primary-btn,
      .product-secondary-btn{
        width:100%;
      }
    }

    @media (max-width:520px){
      .product-page-grid{
        gap:16px;
      }
      .product-title{
        font-size:28px;
      }
      .product-price-current{
        font-size:30px;
      }
      .product-qty{
        width:100%;
        justify-content:space-between;
      }
      .product-qty-control{
        width:100%;
        justify-content:space-between;
      }
      .product-qty-control input{
        flex:1;
      }
    }
  </style>
</head>
<body class="product-body">
  <div class="product-topbar">
    <div class="product-topbar-inner">
      <div class="product-brand">
        <div class="product-brand-logo">🧸</div>
        <div class="product-brand-text">
          <span class="logo">Kids Room</span>
          <small>Сторінка товару</small>
        </div>
      </div>

      <div class="product-topbar-actions">
        <button class="product-mini-btn" type="button" onclick="goBack()">← Назад</button>
        <button class="product-cart-fab" id="product-cart-button" type="button" onclick="goHomeToCart()" aria-label="Перейти до кошика">
          🛒
          <span id="product-cart-count">0</span>
        </button>
      </div>
    </div>
  </div>

  <main class="product-shell">
    <div class="product-breadcrumbs">
      <a href="index.html">Головна</a>
      <span>›</span>
      <button type="button" onclick="goBack()">Каталог</button>
      <span>›</span>
      <span id="breadcrumb-name">Товар</span>
    </div>

    <div id="product-page"></div>
  </main>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script>
    const STORE_STATE_KEY = "kids_room_store_state";
    const RECENTLY_VIEWED_KEY = "kids_room_recently_viewed";

    function plus(id){
      const el = document.getElementById("qty-" + id);
      if (!el) return;
      const value = parseInt(el.value || "1", 10);
      el.value = isNaN(value) || value < 1 ? 1 : value + 1;
    }

    function minus(id){
      const el = document.getElementById("qty-" + id);
      if (!el) return;
      const value = parseInt(el.value || "1", 10);
      if (isNaN(value) || value <= 1) {
        el.value = 1;
        return;
      }
      el.value = value - 1;
    }

    const CATEGORY_NAMES = {
      toy: "Іграшки",
      stroller: "Коляски",
      seat: "Автокрісла",
      clothes: "Одяг",
      transport: "Транспорт",
      sorter: "Сортери",
      baby: "Для немовлят",
      school: "Шкільні товари",
      furniture: "Дитячі меблі",
      feeding: "Годування",
      hygiene: "Гігієна",
      bedding: "Постіль",
      creativity: "Творчість"
    };

    function fallbackImage(){
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
          <rect width="1200" height="900" rx="48" fill="#f3e4d3"/>
          <text x="600" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="82" font-weight="700" fill="#c56617">Kids Room</text>
        </svg>
      `);
    }

    function sanitizeImage(src){
      if (!src || typeof src !== 'string') return fallbackImage();
      const value = src.trim();
      if (!value) return fallbackImage();
      return value;
    }

    function getCategoryNameLocal(cat){
      return CATEGORY_NAMES[cat] || cat || 'Категорія';
    }

    function refreshProductsSafe(){
      if (typeof refreshProductsFromStorage === 'function') {
        refreshProductsFromStorage();
      }
    }

    function getSelectedProduct(){
      refreshProductsSafe();

      let stored = null;
      try {
        stored = JSON.parse(localStorage.getItem('selectedProduct') || 'null');
      } catch (e) {
        stored = null;
      }

      if (stored && stored.id && Array.isArray(window.products)) {
        const fresh = products.find(item => String(item.id) === String(stored.id));
        if (fresh) return fresh;
      }

      return stored;
    }

    function getDiscountPercent(oldPrice, currentPrice){
      const oldVal = Number(oldPrice || 0);
      const curVal = Number(currentPrice || 0);
      if (!oldVal || !curVal || oldVal <= curVal) return null;
      return Math.round(((oldVal - curVal) / oldVal) * 100);
    }

    function getStockClass(status){
      const safe = String(status || "in_stock");
      if (safe === "low_stock") return "stock-low";
      if (safe === "out_of_stock") return "stock-out";
      return "stock-in";
    }

    function getStockLabel(status){
      if (typeof getStockStatusName === "function") {
        return getStockStatusName(status);
      }
      const safe = String(status || "in_stock");
      if (safe === "low_stock") return "Закінчується";
      if (safe === "out_of_stock") return "Немає в наявності";
      return "Є в наявності";
    }

    function buildProductFlags(product){
      const items = [];
      if (product?.is_hit) items.push('<span class="product-flag hit">ХІТ</span>');
      if (product?.is_sale) items.push('<span class="product-flag sale">АКЦІЯ</span>');
      if (product?.is_new) items.push('<span class="product-flag new">НОВИНКА</span>');
      items.push(`<span class="product-flag ${getStockClass(product?.stock_status)}">${escapeHtml(getStockLabel(product?.stock_status))}</span>`);
      return `<div class="product-image-flags">${items.join('')}</div>`;
    }

    function buildRelatedFlags(product){
      const items = [];
      if (product?.is_hit) items.push('<span class="product-related-flag hit">ХІТ</span>');
      if (product?.is_sale) items.push('<span class="product-related-flag sale">АКЦІЯ</span>');
      if (product?.is_new) items.push('<span class="product-related-flag new">НОВИНКА</span>');
      if (!items.length) return '';
      return `<div class="product-related-flags">${items.join('')}</div>`;
    }

    function escapeHtml(value){
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function updateProductCartCount(){
      let count = 0;
      try {
        const cartData = JSON.parse(localStorage.getItem('cart') || '[]');
        if (Array.isArray(cartData)) {
          count = cartData.reduce((sum, item) => sum + Number(item.qty || 0), 0);
        }
      } catch (e) {
        count = 0;
      }

      const countEl = document.getElementById('product-cart-count');
      if (countEl) countEl.textContent = count;
    }

    function goBack(){
      const returnUrl = localStorage.getItem("kids_room_return_url") || "index.html";
      window.location.href = returnUrl;
    }

    function goHomeToCart(){
      localStorage.setItem("kids_room_open_cart_after_return", "true");
      window.location.href = "index.html";
    }

    function animateToCartFromProduct(){
      const image = document.getElementById('product-main-image');
      const cartButton = document.getElementById('product-cart-button');

      if (!cartButton) return;

      if (!image) {
        cartButton.classList.add('bump');
        setTimeout(() => cartButton.classList.remove('bump'), 450);
        return;
      }

      const imgRect = image.getBoundingClientRect();
      const cartRect = cartButton.getBoundingClientRect();

      const clone = image.cloneNode(true);
      clone.className = 'fly-clone';
      clone.style.left = imgRect.left + 'px';
      clone.style.top = imgRect.top + 'px';
      clone.style.width = imgRect.width + 'px';
      clone.style.height = imgRect.height + 'px';
      document.body.appendChild(clone);

      requestAnimationFrame(() => {
        clone.style.left = (cartRect.left + cartRect.width / 2 - 30) + 'px';
        clone.style.top = (cartRect.top + cartRect.height / 2 - 30) + 'px';
        clone.style.width = '60px';
        clone.style.height = '60px';
        clone.style.transform = 'scale(.2) rotate(10deg)';
        clone.style.opacity = '.2';
      });

      setTimeout(() => {
        clone.remove();
        cartButton.classList.add('bump');
        setTimeout(() => cartButton.classList.remove('bump'), 450);
      }, 760);
    }

    function openRelatedProduct(id){
      if (!Array.isArray(window.products)) return;
      const product = products.find(item => String(item.id) === String(id));
      if (!product) return;

      localStorage.setItem('selectedProduct', JSON.stringify(product));
      addRecentlyViewed(id);
      window.location.href = 'product.html';
    }

    function addRelatedToCart(id, event){
      if (event) event.stopPropagation();

      const tempId = "qty-" + id;
      let tempInput = document.getElementById(tempId);

      if (!tempInput) {
        tempInput = document.createElement("input");
        tempInput.type = "hidden";
        tempInput.id = tempId;
        tempInput.value = "1";
        document.body.appendChild(tempInput);
      }

      tempInput.value = "1";

      if (typeof addToCart === 'function') {
        addToCart(id);
      }

      setTimeout(updateProductCartCount, 120);
    }

    function addRecentlyViewed(id) {
      const value = String(id);
      let list = [];
      try {
        list = JSON.parse(localStorage.getItem(RECENTLY_VIEWED_KEY) || "[]");
        if (!Array.isArray(list)) list = [];
      } catch {
        list = [];
      }

      list = [value, ...list.filter(item => item !== value)].slice(0, 16);
      localStorage.setItem(RECENTLY_VIEWED_KEY, JSON.stringify(list));
    }

    function setMainGalleryImage(src, element){
      const main = document.getElementById("product-main-image");
      if (!main) return;
      main.src = src;

      const thumbs = document.querySelectorAll(".product-thumb");
      thumbs.forEach(item => item.classList.remove("active"));
      if (element) element.classList.add("active");
    }

    function buildRelatedSection(product){
      if (!product || !Array.isArray(window.products)) return '';

      const related = products
        .filter(item => String(item.id) !== String(product.id) && String(item.category) === String(product.category))
        .slice(0, 4);

      if (!related.length) {
        return `
          <aside class="product-related-side">
            <div class="product-related-head">
              <h2>Схожі товари</h2>
              <p>Поки що в цій категорії немає інших товарів.</p>
            </div>
          </aside>
        `;
      }

      return `
        <aside class="product-related-side">
          <div class="product-related-head">
            <h2>Схожі товари</h2>
            <p>Інші товари з цієї ж категорії.</p>
          </div>

          <div class="product-related-list">
            ${related.map(item => `
              <article class="product-related-card" onclick="openRelatedProduct('${escapeHtml(item.id)}')">
                <div class="product-related-image">
                  ${buildRelatedFlags(item)}
                  <img src="${escapeHtml(sanitizeImage((typeof getSafeProductImage === 'function' ? getSafeProductImage(item) : item.img)))}" alt="${escapeHtml(item.name)}" onerror="this.onerror=null;this.src=fallbackImage();">
                </div>

                <div class="product-related-body">
                  <h3 class="product-related-name">${escapeHtml(item.name)}</h3>
                  <p class="product-related-desc">${escapeHtml(item.description || 'Якісний дитячий товар для щоденного використання.').slice(0, 82)}${(item.description || '').length > 82 ? '…' : ''}</p>

                  <div class="product-related-price">
                    <span class="current">${Number(item.price || 0)} грн</span>
                    ${Number(item.old || 0) > Number(item.price || 0) ? `<span class="old">${Number(item.old || 0)} грн</span>` : ''}
                  </div>

                  <div class="product-related-actions">
                    <button class="primary" type="button" onclick="event.stopPropagation(); openRelatedProduct('${escapeHtml(item.id)}')">Відкрити</button>
                    <button class="secondary" type="button" onclick="addRelatedToCart('${escapeHtml(item.id)}', event)">У кошик</button>
                  </div>
                </div>
              </article>
            `).join('')}
          </div>
        </aside>
      `;
    }

    function buildReviewsSection(product) {
      const reviews = Array.isArray(product?.reviews) ? product.reviews.filter(item => item && item.text) : [];

      if (!reviews.length) {
        return `
          <section class="product-reviews">
            <h3>Відгуки</h3>
            <div class="product-review-card">
              <div class="product-review-text">Поки що відгуків немає. Цей блок готовий для майбутнього наповнення.</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="product-reviews">
          <h3>Відгуки</h3>
          <div class="product-review-list">
            ${reviews.map(item => `
              <article class="product-review-card">
                <div class="product-review-top">
                  <div class="product-review-author">${escapeHtml(item.author || "Покупець")}</div>
                  <div class="product-review-date">${escapeHtml(item.date || "")}</div>
                </div>
                <div class="product-review-stars">${"★".repeat(Math.max(1, Math.min(5, Number(item.rating || 5))))}</div>
                <div class="product-review-text">${escapeHtml(item.text || "")}</div>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderProductPage(){
      const container = document.getElementById('product-page');
      const crumb = document.getElementById('breadcrumb-name');
      const product = getSelectedProduct();

      if (!container) return;

      if (!product) {
        if (crumb) crumb.textContent = 'Товар не знайдено';
        container.innerHTML = `
          <section class="product-empty">
            <h1>Товар не знайдено</h1>
            <p>Схоже, сторінка була відкрита без вибору товару. Повернись у каталог і відкрий потрібну картку ще раз.</p>
            <button class="product-primary-btn" type="button" onclick="window.location.href='index.html'">Перейти в каталог</button>
          </section>
        `;
        return;
      }

      addRecentlyViewed(product.id);

      const imageSrc = sanitizeImage(typeof getSafeProductImage === "function" ? getSafeProductImage(product) : product.img);
      const gallery = Array.isArray(product.gallery) && product.gallery.length
        ? product.gallery.map(item => sanitizeImage(item))
        : [imageSrc];

      const categoryName = typeof getCategoryName === "function"
        ? getCategoryName(product.category)
        : getCategoryNameLocal(product.category);

      const discount = getDiscountPercent(product.old, product.price);
      const description = product.description || 'Якісний дитячий товар для щоденного використання.';
      const flagsHtml = buildProductFlags(product);
      const relatedHtml = buildRelatedSection(product);
      const reviewsHtml = buildReviewsSection(product);
      const stockClass = getStockClass(product.stock_status);
      const stockLabel = getStockLabel(product.stock_status);
      const isOutOfStock = String(product.stock_status || "in_stock") === "out_of_stock";
      const tags = Array.isArray(product.tags) ? product.tags.filter(Boolean) : [];

      if (crumb) crumb.textContent = product.name || 'Товар';
      document.title = `Kids Room — ${product.name || 'Товар'}`;

      container.innerHTML = `
        <div class="product-page-grid">
          <section class="product-layout">
            <div class="product-gallery">
              <div class="product-gallery-frame">
                ${flagsHtml}
                <img id="product-main-image" class="product-main-image" src="${imageSrc}" alt="${escapeHtml(product.name)}" onerror="this.onerror=null;this.src=fallbackImage();">
                <div class="product-image-chip">🧸 ${escapeHtml(categoryName)}</div>
              </div>

              ${gallery.length > 1 ? `
                <div class="product-thumb-row">
                  ${gallery.map((img, index) => `
                    <img
                      src="${escapeHtml(img)}"
                      alt="${escapeHtml(product.name)}"
                      class="product-thumb ${index === 0 ? "active" : ""}"
                      onclick="setMainGalleryImage('${escapeHtml(img)}', this)"
                      onerror="this.onerror=null;this.src=fallbackImage();"
                    >
                  `).join("")}
                </div>
              ` : ``}
            </div>

            <article class="product-info-card">
              <div class="product-badges">
                <span class="product-badge">📦 Швидка обробка замовлення</span>
                <span class="product-badge">🛡️ Перевірений товар</span>
                ${product.is_hit ? `<span class="product-badge">🔥 Хіт продажу</span>` : ``}
                ${product.is_sale ? `<span class="product-badge">🏷️ Акційна пропозиція</span>` : ``}
                ${product.is_new ? `<span class="product-badge">✨ Новинка</span>` : ``}
              </div>

              <h1 class="product-title">${escapeHtml(product.name)}</h1>

              <div class="product-price-row">
                <div class="product-price-current">${Number(product.price || 0)} грн</div>
                ${Number(product.old || 0) > Number(product.price || 0) ? `<div class="product-price-old">${Number(product.old || 0)} грн</div>` : ''}
                ${discount ? `<div class="product-discount">-${discount}%</div>` : ''}
              </div>

              <p class="product-desc">${escapeHtml(description)}</p>

              ${tags.length ? `
                <div class="product-tags">
                  ${tags.map(tag => `<span class="product-tag">${escapeHtml(tag)}</span>`).join("")}
                </div>
              ` : ``}

              <ul class="product-feature-list">
                <li><strong>Категорія</strong>${escapeHtml(categoryName)}</li>
                <li><strong>Наявність</strong>${escapeHtml(stockLabel)}</li>
              </ul>

              <div class="product-trust-row">
                <div class="product-trust-card">
                  <strong>🚚 Доставка</strong>
                  <span>Нова пошта та Укрпошта по Україні.</span>
                </div>
                <div class="product-trust-card">
                  <strong>💬 Підтвердження</strong>
                  <span>Менеджер зв’яжеться після оформлення.</span>
                </div>
                <div class="product-trust-card">
                  <strong>🧾 Умови</strong>
                  <span>Окремо доступні сторінки оплати, доставки та повернення.</span>
                </div>
              </div>

              <div class="product-buy-box">
                <div class="product-buy-top">
                  <div class="product-stock ${stockClass}">${stockClass === "stock-in" ? "✅ " : stockClass === "stock-low" ? "⚠️ " : "⛔ "} ${escapeHtml(stockLabel)}</div>
                  <div class="product-qty">
                    <span class="product-qty-label">Кількість</span>
                    <div class="product-qty-control">
                      <button type="button" onclick="minus('${escapeHtml(product.id)}')" ${isOutOfStock ? "disabled" : ""}>−</button>
                      <input id="qty-${escapeHtml(product.id)}" type="number" value="1" min="1" inputmode="numeric" ${isOutOfStock ? "disabled" : ""}>
                      <button type="button" onclick="plus('${escapeHtml(product.id)}')" ${isOutOfStock ? "disabled" : ""}>+</button>
                    </div>
                  </div>
                </div>

                <div class="product-actions">
                  <button class="product-primary-btn" type="button" ${isOutOfStock ? "disabled" : ""} onclick="handleProductAddToCart('${escapeHtml(product.id)}')">${isOutOfStock ? "⛔ Немає в наявності" : "🛒 Додати в кошик"}</button>
                  <button class="product-secondary-btn" type="button" onclick="goBack()">← Повернутись до товарів</button>
                </div>

                <div class="product-note">Після натискання товар одразу додається в кошик. Менеджер підтвердить замовлення після оформлення.</div>
              </div>

              ${reviewsHtml}
            </article>
          </section>

          ${relatedHtml}
        </div>
      `;
    }

    function handleProductAddToCart(id){
      animateToCartFromProduct();

      if (typeof addToCart === 'function') {
        addToCart(id);
      }

      setTimeout(updateProductCartCount, 120);
    }

    renderProductPage();
    updateProductCartCount();

    window.addEventListener('storage', event => {
      if (event.key === 'cart') updateProductCartCount();
      if (event.key === 'products') renderProductPage();
    });

    window.addEventListener('products:updated', renderProductPage);
    window.addEventListener('cart:updated', updateProductCartCount);

    document.addEventListener("DOMContentLoaded", function () {
      const openCartAfterReturn = localStorage.getItem("kids_room_open_cart_after_return");
      if (openCartAfterReturn === "true") {
        localStorage.removeItem("kids_room_open_cart_after_return");
      }
    });

    window.plus = plus;
    window.minus = minus;
    window.goBack = goBack;
    window.goHomeToCart = goHomeToCart;
    window.openRelatedProduct = openRelatedProduct;
    window.addRelatedToCart = addRelatedToCart;
    window.handleProductAddToCart = handleProductAddToCart;
    window.setMainGalleryImage = setMainGalleryImage;
  </script>
</body>
</html>
