<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Товар</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-wrap">
        <div class="logo">Kids Room</div>
        <div class="logo-subtitle">Сторінка товару</div>
    </div>
</header>

<div class="product-page-shell">
    <div id="product-page" class="product-page"></div>
</div>

<script>
function goBack() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.close();
    }
}

const product = JSON.parse(localStorage.getItem("selectedProduct") || "null");
const container = document.getElementById("product-page");

if (product && container) {
    const safeImg = (typeof getSafeProductImage === "function") ? getSafeProductImage(product) : (product.img || "product-placeholder.svg");
    container.innerHTML = `
        <div class="product-page-card">
            <div class="product-page-image-wrap">
                <img src="${safeImg}" alt="${product.name}" onerror="this.onerror=null;this.src='product-placeholder.svg'">
            </div>
            <div class="product-page-info">
                <div class="product-page-category">${typeof getCategoryIcon === "function" ? getCategoryIcon(product.category) : "📦"} ${typeof getCategoryName === "function" ? getCategoryName(product.category) : (product.category || "Товар")}</div>
                <h1>${product.name}</h1>
                <h2>${product.price} грн</h2>
                <p>${product.description || "Опис товару буде додано найближчим часом."}</p>
                <div class="product-page-actions">
                    <button type="button" class="add-btn" onclick="addToCart('${product.id}')">Додати в кошик</button>
                    <button type="button" class="secondary-btn product-back-btn" onclick="goBack()">Назад</button>
                </div>
            </div>
        </div>
    `;
}
</script>

<script src="products.js"></script>
<script src="cart.js"></script>

</body>
</html>
